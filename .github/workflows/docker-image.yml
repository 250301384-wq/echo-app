name: Docker Image CI

on:
  push:
    branches: [ "main", "staging" ]  # 推送至 main 或 staging 分支时触发
  pull_request:
    branches: [ "main" ]  # 对 main 分支的 PR 触发

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 启用 Docker Buildx 以支持缓存
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 缓存 Docker 层，加速构建
      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # 构建镜像并打上 commit 哈希标签
      - name: Build Docker image
        run: |
          docker buildx build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache,mode=max \
            . --file Dockerfile --tag my-image-name:${{ github.sha }}

      # 验证镜像可正常运行
      - name: Test Docker image
        run: |
          # 启动容器（根据实际情况修改端口和命令）
          docker run -d -p 8080:8080 --name test-container my-image-name:${{ github.sha }}
          # 等待容器初始化（根据应用启动时间调整）
          sleep 10
          # 验证服务是否可用（示例：检查健康检查接口）
          if ! curl -f http://localhost:8080/health; then
            echo "❌ Container failed to start"
            docker logs test-container  # 打印日志方便排查
            exit 1
          fi
          echo "✅ Container test passed"
          docker stop test-container && docker rm test-container
